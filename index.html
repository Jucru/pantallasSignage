<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Siera Signage v3.0 - AutoDetect</title>
    <style>
        /* Pantalla completa y fondo negro */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; font-family: sans-serif; 
        }

        /* Contenedor del Slideshow */
        #slideshow { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
        }

        /* Imagen Responsive: Se escala sin recortar */
        .slide { 
            position: absolute; 
            width: 100%; height: 100%; 
            opacity: 0; transition: opacity 1.2s ease-in-out; 
            object-fit: contain; /* Muestra la imagen completa */
            background-color: #000;
        }

        .active { opacity: 1; }

        /* Barra inferior estilo corporativo */
        #info-bar { 
            position: absolute; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.8); color: white; 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 25px; box-sizing: border-box; z-index: 100; 
            border-top: 3px solid #005596; 
        }

        #label-data { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; }
        #clock { font-size: 1.8rem; font-weight: 300; }
        #loader { 
            position: absolute; top: 50%; left: 50%; color: white; 
            transform: translate(-50%, -50%); z-index: 200; font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="loader">Sincronizando archivos...</div>
    <div id="slideshow"></div>

    <div id="info-bar">
        <div id="label-data">Iniciando...</div>
        <div id="clock">00:00</div>
    </div>

    <script>
        // 1. Lógica para detectar el Área (Compatible con Android Viejo)
        var area = "full";
        var query = window.location.search.substring(1);
        var vars = query.split("&");
        for (var i=0; i<vars.length; i++) {
            var pair = vars[i].split("=");
            if(pair[0] == "area"){ area = pair[1]; }
        }

        var prefixes = { 'full': 'full', 'playa': 'playa', 'gaming': 'gc' };
        var prefix = prefixes[area] || 'full';
        var imagesFound = [];
        var maxPossible = 30; // Límite de búsqueda

        // 2. Escáner automático de archivos en la carpeta
        function scanImages(index) {
            if (index > maxPossible) {
                startSlideshow();
                return;
            }

            var num = (index < 10) ? "0" + index : index;
            var testImg = new Image();
            var src = "media/" + area + "/" + prefix + num + ".jpg";

            testImg.onload = function() {
                imagesFound.push(src);
                scanImages(index + 1);
            };

            testImg.onerror = function() {
                startSlideshow(); // Se detiene al no encontrar más correlativos
            };

            testImg.src = src;
        }

        // 3. Iniciar el carrusel
        function startSlideshow() {
            var loader = document.getElementById('loader');
            var container = document.getElementById('slideshow');
            var label = document.getElementById('label-data');

            if (imagesFound.length === 0) {
                loader.innerText = "Error: Sin archivos en media/" + area;
                return;
            }

            loader.style.display = 'none';
            
            // Punto 1: Mostrar Sector y Cantidad (A:X)
            label.innerText = area.toUpperCase() + " | A:" + imagesFound.length;

            // Inyectar imágenes en el DOM
            for (var k = 0; k < imagesFound.length; k++) {
                var img = document.createElement('img');
                img.src = imagesFound[k];
                img.className = 'slide' + (k === 0 ? ' active' : '');
                img.id = 'slide-' + (k + 1);
                container.appendChild(img);
            }

            // Rotación automática
            var current = 1;
            var total = imagesFound.length;
            if (total > 1) {
                setInterval(function() {
                    document.getElementById('slide-' + current).className = 'slide';
                    current = (current % total) + 1;
                    document.getElementById('slide-' + current).className = 'slide active';
                }, 8000);
            }
        }

        // 4. Reloj tiempo real
        function updateClock() {
            var now = new Date();
            var h = (now.getHours() < 10 ? "0" : "") + now.getHours();
            var m = (now.getMinutes() < 10 ? "0" : "") + now.getMinutes();
            document.getElementById('clock').innerText = h + ":" + m;
        }

        // Iniciar procesos
        scanImages(1);
        setInterval(updateClock, 1000);
        updateClock();

        // Refresco de seguridad cada 1 hora para buscar nuevos archivos subidos a Git
        setTimeout(function() { location.reload(); }, 3600000);
    </script>
</body>
</html>
