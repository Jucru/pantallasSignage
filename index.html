<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YPF Full - Terminal V13</title>
    <style>
        :root { --azul: #005596; --amarillo: #ffcc00; --verde: #00a859; --rojo: #cc0000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }

        .view { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; }
        .active-view { display: block !important; }

        /* PROMOS */
        #view-promos { z-index: 10; background: #000; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s; object-fit: contain; }
        .active-slide { opacity: 1; }

        /* PRECIOS */
        #view-precios { z-index: 50; background: #fff; }
        .header { height: 80px; background: var(--azul); display: flex; align-items: center; padding: 0 15px; }
        #input-busqueda { flex-grow: 1; font-size: 1.8rem; padding: 12px; border-radius: 8px; border: none; }

        /* CAMARA */
        #view-camara { z-index: 100; background: #000; }
        #cam-video {
            width: 100%; height: 100%;
            object-fit: cover;
            position: absolute; top: 0; left: 0;
            transform: scaleX(-1);
        }
        .mask {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; height: 30%;
            border: 3px dashed var(--amarillo);
            z-index: 110; pointer-events: none;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
        }

        /* BOTONES */
        .btn { padding: 15px 25px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; z-index: 150; }
        .btn-float { position: absolute; right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-p { top: 20px; background: var(--amarillo); color: #000; }
        .btn-s { top: 90px; background: var(--verde); color: #fff; }
        .btn-v { width: 100%; height: 80px; background: var(--rojo); color: #fff; border-radius: 0; position: absolute; bottom: 0; font-size: 1.5rem; }

        #btn-start-cam {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--verde); color: white;
            padding: 30px; font-size: 2rem;
            z-index: 160; border-radius: 15px; border: none; cursor: pointer;
        }

        #info {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.8); color: #fff;
            display: flex; justify-content: space-between;
            padding: 10px 20px; box-sizing: border-box;
            z-index: 20; border-top: 2px solid var(--azul);
        }

        #cam-status {
            position: absolute; bottom: 90px; width: 100%;
            text-align: center; color: #fff;
            font-size: 1.1rem; z-index: 160;
            text-shadow: 0 1px 4px #000;
            pointer-events: none;
        }

        #cam-error {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(200,0,0,0.85); color: #fff;
            padding: 20px 30px; border-radius: 12px;
            font-size: 1.2rem; text-align: center;
            z-index: 170; display: none; max-width: 80%;
        }
    </style>
</head>
<body>

    <div id="view-promos" class="view active-view">
        <div id="slideshow"></div>
        <div id="info"><span id="txt-area">Cargando...</span><span id="txt-clock">00:00</span></div>
    </div>

    <div id="view-precios" class="view">
        <div class="header">
            <input type="text" id="input-busqueda" placeholder="Buscar...">
        </div>
        <div style="height:calc(100% - 160px); overflow:auto;">
            <table style="width:100%; border-collapse:collapse;"><tbody id="res"></tbody></table>
        </div>
        <button class="btn btn-v" id="btn-volver-precios">VOLVER</button>
    </div>

    <div id="view-camara" class="view">
        <video id="cam-video" autoplay playsinline muted></video>
        <div class="mask"></div>
        <div id="cam-status">Apuntá el código de barras al recuadro</div>
        <div id="cam-error"></div>
        <button id="btn-start-cam">TOCAR PARA ACTIVAR CÁMARA</button>
        <button class="btn btn-v" style="z-index:170;" id="btn-cancelar-cam">CANCELAR / VOLVER</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>

    <script>
        const AREA = new URLSearchParams(window.location.search).get('area') || 'full';
        const IS_FULL = AREA === 'full';
        let DB = [], IMGS = [], CURR = 0;
        let codeReader = null;
        let scannerActivo = false;

        // ── Navegación ───────────────────────────────────────────────────────────
        function nav(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(id).classList.add('active-view');
            if (id !== 'view-camara') stopCam();
            if (id === 'view-precios') {
                render(DB);
                setTimeout(() => document.getElementById('input-busqueda').focus(), 300);
            }
        }

        // ── Cámara con ZXing ─────────────────────────────────────────────────────
        function stopCam() {
            scannerActivo = false;
            if (codeReader) {
                try { codeReader.reset(); } catch (e) {}
                codeReader = null;
            }
            const video = document.getElementById('cam-video');
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }
            const btn = document.getElementById('btn-start-cam');
            if (btn) btn.style.display = 'block';
            ocultarErrorCam();
        }

        function mostrarErrorCam(msg) {
            const el = document.getElementById('cam-error');
            el.innerText = msg;
            el.style.display = 'block';
        }

        function ocultarErrorCam() {
            const el = document.getElementById('cam-error');
            if (el) el.style.display = 'none';
        }

        function startCameraNow() {
            document.getElementById('btn-start-cam').style.display = 'none';
            ocultarErrorCam();
            scannerActivo = true;

            navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'user',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            }).then(stream => {
                const video = document.getElementById('cam-video');
                video.srcObject = stream;

                codeReader = new ZXing.BrowserMultiFormatReader();

                // Solo EAN-13 y Code128, sin EAN-8
                const hints = new Map();
                hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                    ZXing.BarcodeFormat.EAN_13,
                    ZXing.BarcodeFormat.CODE_128
                ]);
                hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
                codeReader.hints = hints;

                codeReader.decodeFromVideoElement(video, (result, err) => {
                    if (!scannerActivo) return;
                    if (result) {
                        const codigo = result.getText();
                        if (!codigo || codigo.length < 8) return;
                        scannerActivo = false;
                        stopCam();
                        nav('view-precios');
                        document.getElementById('input-busqueda').value = codigo;
                        filter();
                    }
                    // err es normal en ZXing cuando no hay código visible en el cuadro
                });

            }).catch(err => {
                console.error("Camera error:", err);
                let msg = "No se pudo acceder a la cámara.";
                if (err.name === "NotAllowedError")  msg = "Permiso de cámara denegado. Habilitalo en la configuración de Fully Kiosk.";
                if (err.name === "NotFoundError")    msg = "No se encontró ninguna cámara en el dispositivo.";
                if (err.name === "NotReadableError") msg = "La cámara está en uso por otra aplicación.";
                mostrarErrorCam(msg);
                document.getElementById('btn-start-cam').style.display = 'block';
            });
        }

        // ── Precios ──────────────────────────────────────────────────────────────
        let debounceTimer;
        function filter() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const val = document.getElementById('input-busqueda').value
                    .toLowerCase()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "");
                const filtered = DB.filter(i =>
                    (i.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(val)) ||
                    (i.b && i.b.includes(val))
                );
                render(filtered);
            }, 150);
        }

        function render(data) {
            document.getElementById('res').innerHTML = data.map(i =>
                `<tr>
                    <td style="padding:15px; border-bottom:1px solid #eee;">
                        ${i.n}<br><small>${i.b || ''}</small>
                    </td>
                    <td style="padding:15px; text-align:right; font-weight:bold; color:var(--azul);">
                        ${i.p}
                    </td>
                </tr>`
            ).join('') || "<tr><td colspan='2' style='padding:15px;'>No encontrado</td></tr>";
        }

        // ── Slideshow ────────────────────────────────────────────────────────────
        function loadImgs() {
            const isL = window.innerWidth > window.innerHeight;
            const pre = (AREA === 'gaming' ? 'gc' : AREA);
            const suf = isL ? "_h" : "_v";
            for (let i = 1; i <= 15; i++) {
                const img = new Image();
                const path = `media/${AREA}/${pre}${i < 10 ? '0' + i : i}${suf}.jpg`;
                img.onload = () => {
                    IMGS.push(path);
                    if (IMGS.length === 1) initSlideshow();
                    else agregarSlide(path, IMGS.length - 1);
                };
                img.src = path;
            }
        }

        function initSlideshow() {
            const container = document.getElementById('slideshow');
            container.innerHTML = '';
            const el = document.createElement('img');
            el.src = IMGS[0];
            el.className = 'slide active-slide';
            el.id = 's0';
            container.appendChild(el);
            document.getElementById('txt-area').innerText = `${AREA.toUpperCase()} | A:1`;
            startSlideInterval();
        }

        function agregarSlide(path, index) {
            const container = document.getElementById('slideshow');
            const el = document.createElement('img');
            el.src = path;
            el.className = 'slide';
            el.id = 's' + index;
            container.appendChild(el);
            document.getElementById('txt-area').innerText = `${AREA.toUpperCase()} | A:${IMGS.length}`;
        }

        let slideInterval = null;
        function startSlideInterval() {
            if (slideInterval) return;
            slideInterval = setInterval(() => {
                if (IMGS.length < 2) return;
                document.getElementById('s' + CURR).classList.remove('active-slide');
                CURR = (CURR + 1) % IMGS.length;
                const next = document.getElementById('s' + CURR);
                if (next) next.classList.add('active-slide');
            }, 8000);
        }

        // ── Reloj ────────────────────────────────────────────────────────────────
        function updateClock() {
            const d = new Date();
            document.getElementById('txt-clock').innerText =
                d.getHours() + ":" + (d.getMinutes() < 10 ? "0" : "") + d.getMinutes();
        }

        // ── Init ─────────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {

            if (IS_FULL) {
                const promoView = document.getElementById('view-promos');

                const btnPrecios = document.createElement('button');
                btnPrecios.className = 'btn btn-float btn-p';
                btnPrecios.innerText = 'PRECIOS';
                btnPrecios.addEventListener('click', () => nav('view-precios'));
                promoView.appendChild(btnPrecios);

                const btnEscanear = document.createElement('button');
                btnEscanear.className = 'btn btn-float btn-s';
                btnEscanear.innerText = 'ESCANEAR';
                btnEscanear.addEventListener('click', () => nav('view-camara'));
                promoView.appendChild(btnEscanear);
            }

            document.getElementById('btn-volver-precios').addEventListener('click', () => nav('view-promos'));
            document.getElementById('btn-start-cam').addEventListener('click', startCameraNow);
            document.getElementById('btn-cancelar-cam').addEventListener('click', () => {
                stopCam();
                nav('view-promos');
            });
            document.getElementById('input-busqueda').addEventListener('keyup', filter);

            fetch('precios.json?v=' + Math.random())
                .then(r => r.json())
                .then(d => { DB = d; })
                .catch(() => {
                    document.getElementById('res').innerHTML =
                        "<tr><td colspan='2' style='padding:15px; color:var(--rojo);'>Error al cargar el listado de precios.</td></tr>";
                });

            updateClock();
            setInterval(updateClock, 1000);
            loadImgs();
        });
    </script>
</body>
</html>
