<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YPF Full - Terminal Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/quaggajs@0.12.1/dist/quagga.min.js"></script>
    <style>
        :root { --ypf-azul: #005596; --ypf-amarillo: #ffcc00; --ypf-verde: #00a859; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* Vistas con transiciones suaves */
        .view { 
            position: absolute; width: 100%; height: 100%; 
            display: none; opacity: 0; transition: opacity 0.4s ease; 
        }
        .active-view { display: block; opacity: 1; z-index: 10; }

        /* --- PROMOS --- */
        #slideshow { width: 100%; height: 100%; background: #000; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; object-fit: contain; }
        .active-slide { opacity: 1; }

        /* --- PRECIOS --- */
        #view-precios { background: #f4f7f9; z-index: 100; }
        .header { height: 90px; background: var(--ypf-azul); display: flex; align-items: center; padding: 0 20px; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #input-busqueda { flex-grow: 1; font-size: 1.8rem; padding: 15px; border-radius: 12px; border: none; outline: none; }
        
        .tabla-scroll { height: calc(100% - 180px); overflow-y: auto; padding: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        td { background: white; padding: 20px; color: #333; font-size: 1.4rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        td:first-child { border-radius: 12px 0 0 12px; width: 70%; }
        td:last-child { border-radius: 0 12px 12px 0; text-align: right; color: var(--ypf-azul); font-weight: bold; font-size: 1.8rem; }

        /* --- CÁMARA --- */
        #view-camara { background: #000; z-index: 200; }
        #interactive video { width: 100%; height: 100%; object-fit: cover; }
        .scan-mask { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 30%; border: 4px solid var(--ypf-amarillo); border-radius: 20px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); z-index: 210; pointer-events: none;
        }

        /* Botones Estilo YPF */
        .btn-action { 
            position: absolute; right: 30px; padding: 20px 35px; font-size: 1.4rem; font-weight: bold;
            border-radius: 50px; border: none; cursor: pointer; z-index: 50; transition: transform 0.2s;
        }
        .btn-action:active { transform: scale(0.95); }
        .btn-precios { top: 30px; background: var(--ypf-amarillo); color: #000; }
        .btn-scan-home { top: 130px; background: var(--ypf-verde); color: #fff; }
        .btn-volver { bottom: 0; left: 0; width: 100%; height: 90px; background: #cc0000; color: #fff; font-size: 1.6rem; border-radius: 0; position: absolute; }
        
        #info-bar { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; justify-content: space-between; padding: 15px 30px; box-sizing: border-box; z-index: 10; border-top: 3px solid var(--ypf-azul); font-size: 1.2rem; }
    </style>
</head>
<body>

    <section id="view-promos" class="view active-view">
        <button class="btn-action btn-precios" onclick="changeView('view-precios')">LISTA DE PRECIOS</button>
        <button class="btn-action btn-scan-home" onclick="changeView('view-camara')">ESCANEAR PRODUCTO</button>
        <div id="slideshow"></div>
        <div id="info-bar">
            <div id="label-area">Sincronizando...</div>
            <div id="clock">00:00</div>
        </div>
    </section>

    <section id="view-precios" class="view">
        <div class="header">
            <input type="text" id="input-busqueda" placeholder="Escribe el nombre o escanea..." onkeyup="filterPrices()">
            <button class="btn-action" style="position:static; background:var(--ypf-verde); color:white" onclick="changeView('view-camara')">📷</button>
        </div>
        <div class="tabla-scroll">
            <table><tbody id="lista-body"></tbody></table>
        </div>
        <button class="btn-volver" onclick="changeView('view-promos')">VOLVER A PUBLICIDAD</button>
    </section>

    <section id="view-camara" class="view">
        <div class="scan-mask"></div>
        <div id="interactive" class="viewport"></div>
        <button class="btn-volver" onclick="changeView('view-promos')">CANCELAR ESCANEO</button>
    </section>

    <script>
        const state = {
            area: new URLSearchParams(window.location.search).get('area') || 'full',
            prices: [],
            images: [],
            currentSlide: 0
        };

        // --- 1. GESTIÓN DE VISTAS (Navegación arreglada) ---
        function changeView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(viewId).classList.add('active-view');
            
            // Lógica específica al entrar
            if (viewId === 'view-camara') initScanner();
            else Quagga.stop();

            if (viewId === 'view-precios') {
                document.getElementById('input-busqueda').value = '';
                renderPrices(state.prices);
                setTimeout(() => document.getElementById('input-busqueda').focus(), 500);
            }
        }

        // --- 2. CÁMARA (Optimizado para Android 13) ---
        function initScanner() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: { 
                        facingMode: "user", // Cambiar a "environment" si prefieres la cámara trasera
                        aspectRatio: { min: 1, max: 2 } 
                    }
                },
                decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] }
            }, (err) => {
                if (err) { console.error(err); alert("Error al iniciar cámara"); changeView('view-promos'); return; }
                Quagga.start();
            });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                Quagga.stop();
                changeView('view-precios');
                document.getElementById('input-busqueda').value = code;
                filterPrices();
            });
        }

        // --- 3. PRECIOS Y BUSCADOR ---
        function filterPrices() {
            const term = document.getElementById('input-busqueda').value.toLowerCase();
            const filtered = state.prices.filter(p => 
                p.n.toLowerCase().includes(term) || (p.b && p.b.includes(term))
            );
            renderPrices(filtered);
        }

        function renderPrices(data) {
            const body = document.getElementById('lista-body');
            body.innerHTML = data.map(p => `
                <tr>
                    <td>${p.n}<br><small style="color:#888">${p.b || ''}</small></td>
                    <td>${p.p}</td>
                </tr>
            `).join('') || '<tr><td colspan="2">No se encontró el producto</td></tr>';
        }

        // --- 4. SLIDESHOW (Auto-detect funcional) ---
        async function loadSlides() {
            const isLandscape = window.innerWidth > window.innerHeight;
            const suffix = isLandscape ? "_h" : "_v";
            const prefix = (state.area === 'gaming') ? 'gc' : state.area;
            
            for (let i = 1; i <= 20; i++) {
                const num = i.toString().padStart(2, '0');
                const src = `media/${state.area}/${prefix}${num}${suffix}.jpg`;
                try {
                    const res = await fetch(src, { method: 'HEAD' });
                    if (res.ok) state.images.push(src);
                    else break;
                } catch { break; }
            }
            startSlideshow();
        }

        function startSlideshow() {
            const container = document.getElementById('slideshow');
            if (state.images.length === 0) {
                document.getElementById('label-area').innerText = "Sin medios";
                return;
            }
            
            state.images.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = `slide ${i === 0 ? 'active-slide' : ''}`;
                img.id = `s-${i}`;
                container.appendChild(img);
            });

            document.getElementById('label-area').innerText = `${state.area.toUpperCase()} | A:${state.images.length}`;

            setInterval(() => {
                if (state.images.length < 2) return;
                document.getElementById(`s-${state.currentSlide}`).classList.remove('active-slide');
                state.currentSlide = (state.currentSlide + 1) % state.images.length;
                document.getElementById(`s-${state.currentSlide}`).classList.add('active-slide');
            }, 8000);
        }

        // --- INICIO ---
        window.onload = async () => {
            // Reloj
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }, 1000);

            // Cargar Precios
            try {
                const res = await fetch('precios.json?v=' + Math.random());
                state.prices = await res.json();
            } catch (e) { console.error("Error cargando precios"); }

            loadSlides();
        };
    </script>
</body>
</html>
