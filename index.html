<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YPF Full - Terminal Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/quaggajs@0.12.1/dist/quagga.min.js"></script>
    <style>
        :root { --azul: #005596; --amarillo: #ffcc00; --verde: #00a859; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        .view { position: absolute; width: 100%; height: 100%; display: none; background: #000; }
        .active-view { display: block !important; z-index: 10; }

        /* PROMOS */
        #slideshow { width: 100%; height: 100%; position: relative; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s; object-fit: contain; }
        .active-slide { opacity: 1; }

        /* PRECIOS */
        #view-precios { background: #fff; }
        .header { height: 90px; background: var(--azul); display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        #input-busqueda { flex-grow: 1; font-size: 1.8rem; padding: 15px; border-radius: 10px; border: none; }
        .scroll-area { height: calc(100% - 180px); overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 20px; border-bottom: 1px solid #eee; font-size: 1.4rem; color: #333; }
        .p-price { font-weight: bold; color: var(--azul); font-size: 1.7rem; text-align: right; }

        /* CAMARA */
        #interactive.viewport { width: 100%; height: 100%; position: relative; background: #000; }
        #interactive video, #interactive canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .mask { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 30%; border: 4px solid var(--amarillo); border-radius: 15px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); z-index: 20; pointer-events: none; }

        /* BOTONES */
        .btn { padding: 18px 30px; font-size: 1.3rem; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; }
        .btn-float { position: absolute; right: 20px; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .btn-p { top: 20px; background: var(--amarillo); color: #000; }
        .btn-s { top: 110px; background: var(--verde); color: #fff; }
        .btn-v { width: 100%; height: 90px; background: #b30000; color: #fff; border-radius: 0; font-size: 1.5rem; position: absolute; bottom: 0; }

        #info { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: #fff; display: flex; justify-content: space-between; padding: 12px 25px; box-sizing: border-box; z-index: 5; border-top: 2px solid var(--azul); }
    </style>
</head>
<body>

    <div id="view-promos" class="view active-view">
        <button class="btn btn-float btn-p" onclick="changeView('view-precios')">LISTA DE PRECIOS</button>
        <button class="btn btn-float btn-s" onclick="changeView('view-camara')">ESCANEAR 📷</button>
        <div id="slideshow"></div>
        <div id="info"><span id="txt-area">Cargando...</span><span id="txt-clock">00:00</span></div>
    </div>

    <div id="view-precios" class="view">
        <div class="header">
            <input type="text" id="input-busqueda" placeholder="Buscar producto o código..." onkeyup="filterData()">
            <button class="btn" style="background:var(--verde); color:white" onclick="changeView('view-camara')">📷</button>
        </div>
        <div class="scroll-area">
            <table><tbody id="res-precios"></tbody></table>
        </div>
        <button class="btn btn-v" onclick="changeView('view-promos')">VOLVER A PUBLICIDAD</button>
    </div>

    <div id="view-camara" class="view">
        <div class="mask"></div>
        <div id="interactive"></div>
        <button class="btn btn-v" onclick="stopCam()">CANCELAR</button>
    </div>

    <script>
        var area = new URLSearchParams(window.location.search).get('area') || 'full';
        var db = [];
        var images = [];
        var current = 0;

        // 1. ELIMINAR TILDES (Para búsqueda insensible)
        function cleanText(text) {
            return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function changeView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(id).classList.add('active-view');
            if (id === 'view-camara') startCam(); else stopCam();
            if (id === 'view-precios') { 
                document.getElementById('input-busqueda').value = "";
                render(db);
                setTimeout(() => document.getElementById('input-busqueda').focus(), 300);
            }
        }

        // 2. ESCANEO CON CÁMARA
        function startCam() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "user" } },
                decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] }
            }, function(err) {
                if (err) { alert("Permite el uso de la cámara"); changeView('view-promos'); return; }
                Quagga.start();
            });
            Quagga.onDetected(data => {
                Quagga.stop();
                changeView('view-precios');
                document.getElementById('input-busqueda').value = data.codeResult.code;
                filterData();
            });
        }

        function stopCam() { try { Quagga.stop(); } catch(e){} }

        // 3. BUSCADOR SIN TILDES
        function filterData() {
            var val = cleanText(document.getElementById('input-busqueda').value);
            var filtered = db.filter(item => 
                cleanText(item.n).indexOf(val) > -1 || (item.b && item.b.indexOf(val) > -1)
            );
            render(filtered);
        }

        function render(data) {
            var html = "";
            for (var i = 0; i < data.length; i++) {
                html += "<tr><td>" + data[i].n + "<br><small style='color:gray'>" + (data[i].b || '') + "</small></td><td class='p-price'>" + data[i].p + "</td></tr>";
            }
            document.getElementById('res-precios').innerHTML = html || "<tr><td>No encontrado</td></tr>";
        }

        // 4. SLIDESHOW (Método infalible)
        function scan(idx) {
            if (idx > 20) { run(); return; }
            var isL = window.innerWidth > window.innerHeight;
            var suf = isL ? "_h" : "_v";
            var pre = (area === 'gaming') ? 'gc' : area;
            var path = "media/" + area + "/" + pre + (idx < 10 ? "0" + idx : idx) + suf + ".jpg";
            
            var img = new Image();
            img.onload = function() { images.push(path); scan(idx + 1); };
            img.onerror = function() { run(); };
            img.src = path;
        }

        function run() {
            var container = document.getElementById('slideshow');
            if (images.length === 0) { document.getElementById('txt-area').innerText = "Sin medios en " + area; return; }
            for (var i = 0; i < images.length; i++) {
                var el = document.createElement('img');
                el.src = images[i];
                el.className = 'slide' + (i === 0 ? ' active-slide' : '');
                el.id = 's' + i;
                container.appendChild(el);
            }
            document.getElementById('txt-area').innerText = area.toUpperCase() + " | A:" + images.length;
            if (images.length > 1) {
                setInterval(() => {
                    document.getElementById('s' + current).classList.remove('active-slide');
                    current = (current + 1) % images.length;
                    document.getElementById('s' + current).classList.add('active-slide');
                }, 8000);
            }
        }

        window.onload = function() {
            fetch('precios.json?v=' + Math.random()).then(r => r.json()).then(d => db = d);
            setInterval(() => {
                var n = new Date();
                document.getElementById('txt-clock').innerText = n.getHours() + ":" + (n.getMinutes()<10?"0":"") + n.getMinutes();
            }, 1000);
            scan(1);
        };
    </script>
</body>
</html>
