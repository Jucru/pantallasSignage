<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YPF Full - Terminal V11</title>
    <script src="https://cdn.jsdelivr.net/npm/quaggajs@0.12.1/dist/quagga.min.js"></script>
    <style>
        :root { --azul: #005596; --amarillo: #ffcc00; --verde: #00a859; --rojo: #cc0000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        .view { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; }
        .active-view { display: block !important; }

        /* PROMOS */
        #view-promos { z-index: 10; background: #000; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s; object-fit: contain; }
        .active-slide { opacity: 1; }

        /* PRECIOS */
        #view-precios { z-index: 50; background: #fff; }
        .header { height: 80px; background: var(--azul); display: flex; align-items: center; padding: 0 15px; }
        #input-busqueda { flex-grow: 1; font-size: 1.8rem; padding: 12px; border-radius: 8px; border: none; }

        /* CAMARA */
        #view-camara { z-index: 100; background: #000; }
        #interactive { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #interactive video { width: 100%; height: 100%; object-fit: cover; }
        .mask { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 30%; border: 3px dashed var(--amarillo); z-index: 110; pointer-events: none; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); }

        /* BOTONES */
        .btn { padding: 15px 25px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; z-index: 150; }
        .btn-float { position: absolute; right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-p { top: 20px; background: var(--amarillo); color: #000; }
        .btn-s { top: 90px; background: var(--verde); color: #fff; }
        .btn-v { width: 100%; height: 80px; background: var(--rojo); color: #fff; border-radius: 0; position: absolute; bottom: 0; font-size: 1.5rem; }
        
        #btn-start-cam { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--verde); color: white; padding: 30px; font-size: 2rem; z-index: 160; border-radius: 15px; }

        #info { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: #fff; display: flex; justify-content: space-between; padding: 10px 20px; box-sizing: border-box; z-index: 20; border-top: 2px solid var(--azul); }
    </style>
</head>
<body>

    <div id="view-promos" class="view active-view">
        <button id="f1" class="btn btn-float btn-p" onclick="nav('view-precios')">PRECIOS</button>
        <button id="f2" class="btn btn-float btn-s" onclick="nav('view-camara')">ESCANEAR</button>
        <div id="slideshow"></div>
        <div id="info"><span id="txt-area">Cargando...</span><span id="txt-clock">00:00</span></div>
    </div>

    <div id="view-precios" class="view">
        <div class="header"><input type="text" id="input-busqueda" placeholder="Buscar..." onkeyup="filter()"></div>
        <div style="height:calc(100% - 160px); overflow:auto;">
            <table style="width:100%; border-collapse:collapse;"><tbody id="res"></tbody></table>
        </div>
        <button class="btn btn-v" onclick="nav('view-promos')">VOLVER</button>
    </div>

    <div id="view-camara" class="view">
        <div class="mask"></div>
        <div id="interactive"></div>
        <button id="btn-start-cam" onclick="startCameraNow()">TOCAR PARA ACTIVAR CÁMARA</button>
        <button class="btn btn-v" style="z-index:170;" onclick="cancelCam()">CANCELAR / VOLVER</button>
    </div>

    <script>
        const AREA = new URLSearchParams(window.location.search).get('area') || 'full';
        let DB = [], IMGS = [], CURR = 0;

        function nav(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(id).classList.add('active-view');
            if(id !== 'view-camara') cancelCam();
            if(id === 'view-precios') {
                render(DB);
                setTimeout(() => document.getElementById('input-busqueda').focus(), 300);
            }
        }

        function cancelCam() {
            try { Quagga.stop(); } catch(e) {}
            document.getElementById('btn-start-cam').style.display = 'block';
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById('view-promos').classList.add('active-view');
        }

        function startCameraNow() {
            document.getElementById('btn-start-cam').style.display = 'none';
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "user" } },
                decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] }
            }, function(err) {
                if (err) { alert("Error: " + err.name); cancelCam(); return; }
                Quagga.start();
            });
            Quagga.onDetected(d => {
                Quagga.stop();
                nav('view-precios');
                document.getElementById('input-busqueda').value = d.codeResult.code;
                filter();
            });
        }

        function filter() {
            let val = document.getElementById('input-busqueda').value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            let f = DB.filter(i => (i.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(val)) || (i.b && i.b.includes(val)));
            render(f);
        }

        function render(data) {
            document.getElementById('res').innerHTML = data.map(i => `<tr><td style="padding:15px; border-bottom:1px solid #eee;">${i.n}<br><small>${i.b||''}</small></td><td style="padding:15px; text-align:right; font-weight:bold; color:var(--azul);">${i.p}</td></tr>`).join('') || "<tr><td>No encontrado</td></tr>";
        }

        function loadImgs() {
            let isL = window.innerWidth > window.innerHeight;
            let pre = (AREA==='gaming'?'gc':AREA);
            let suf = isL ? "_h" : "_v";
            let count = 0;
            for(let i=1; i<=15; i++) {
                let img = new Image();
                let path = `media/${AREA}/${pre}${i<10?'0'+i:i}${suf}.jpg`;
                img.onload = () => { IMGS.push(path); if(IMGS.length === 1) startSlides(); };
                img.src = path;
            }
        }

        function startSlides() {
            const container = document.getElementById('slideshow');
            IMGS.forEach((s, i) => {
                let el = document.createElement('img'); el.src = s; el.className = 'slide'+(i===0?' active-slide':''); el.id = 's'+i; container.appendChild(el);
            });
            document.getElementById('txt-area').innerText = `${AREA.toUpperCase()} | A:${IMGS.length}`;
            setInterval(() => {
                if(IMGS.length < 2) return;
                document.getElementById('s'+CURR).classList.remove('active-slide');
                CURR = (CURR+1)%IMGS.length;
                document.getElementById('s'+CURR).classList.add('active-slide');
            }, 8000);
        }

        window.onload = () => {
            if(AREA !== 'full') { document.getElementById('f1').style.display='none'; document.getElementById('f2').style.display='none'; }
            fetch('precios.json?v='+Math.random()).then(r => r.json()).then(d => DB = d).catch(() => console.log("JSON Error"));
            setInterval(() => { let d = new Date(); document.getElementById('txt-clock').innerText = d.getHours()+":"+(d.getMinutes()<10?"0":"")+d.getMinutes(); }, 1000);
            loadImgs();
        }
    </script>
</body>
</html>
