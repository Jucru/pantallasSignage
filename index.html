<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Siera Cloud Signage - Auto-Detect</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #slideshow { position: relative; width: 100vw; height: 100vh; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1.2s; object-fit: cover; }
        .active { opacity: 1; }
        #info-bar { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; display: flex; justify-content: space-between; padding: 15px; box-sizing: border-box; z-index: 100; border-top: 2px solid #005596; }
        #clock { font-size: 2rem; }
        #loader { position: absolute; top: 50%; left: 50%; color: white; transform: translate(-50%, -50%); z-index: 200; }
    </style>
</head>
<body>
    <div id="loader">Sincronizando contenidos...</div>
    <div id="slideshow"></div>
    <div id="info-bar">
        <span id="label-area">Iniciando...</span>
        <span id="clock">00:00</span>
    </div>

    <script>
        // 1. Identificar el área
        var area = "full";
        var query = window.location.search.substring(1);
        var vars = query.split("&");
        for (var i=0; i<vars.length; i++) {
            var pair = vars[i].split("=");
            if(pair[0] == "area"){ area = pair[1]; }
        }

        var prefixes = { 'full': 'full', 'playa': 'playa', 'gaming': 'gc' };
        var prefix = prefixes[area] || 'full';
        var imagesFound = [];
        var maxPossible = 20; // Máximo de fotos que intentará buscar
        var loadedCount = 0;

        document.getElementById('label-area').innerText = "Sector: " + area.toUpperCase();

        // 2. Función para buscar imágenes una por una
        function scanImages(index) {
            if (index > maxPossible) {
                startSlideshow();
                return;
            }

            var num = (index < 10) ? "0" + index : index;
            var testImg = new Image();
            var src = "media/" + area + "/" + prefix + num + ".jpg";

            testImg.onload = function() {
                imagesFound.push(src);
                scanImages(index + 1); // Encontrada, buscar la siguiente
            };

            testImg.onerror = function() {
                // No hay más imágenes correlativas, empezar carrusel
                startSlideshow();
            };

            testImg.src = src;
        }

        // 3. Iniciar el carrusel con lo encontrado
        function startSlideshow() {
            if (imagesFound.length === 0) {
                document.getElementById('loader').innerText = "No se encontraron fotos en media/" + area;
                return;
            }

            document.getElementById('loader').style.display = 'none';
            var container = document.getElementById('slideshow');

            for (var k = 0; k < imagesFound.length; k++) {
                var img = document.createElement('img');
                img.src = imagesFound[k];
                img.className = 'slide' + (k === 0 ? ' active' : '');
                img.id = 'slide-' + (k + 1);
                container.appendChild(img);
            }

            var current = 1;
            var total = imagesFound.length;

            setInterval(function() {
                if (total <= 1) return;
                document.getElementById('slide-' + current).className = 'slide';
                current = (current % total) + 1;
                document.getElementById('slide-' + current).className = 'slide active';
            }, 8000);
        }

        // Ejecutar escaneo
        scanImages(1);

        // Reloj
        function updateClock() {
            var now = new Date();
            var h = now.getHours() < 10 ? "0" + now.getHours() : now.getHours();
            var m = now.getMinutes() < 10 ? "0" + now.getMinutes() : now.getMinutes();
            document.getElementById('clock').innerText = h + ":" + m;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
