<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>YPF Full - Punto de Consulta v8</title>
    <script src="https://cdn.jsdelivr.net/npm/quaggajs@0.12.1/dist/quagga.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .view { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; display: none; z-index: 1; }
        .active-view { display: block !important; }

        /* --- VISTA PROMOS --- */
        #slideshow { width: 100%; height: 100%; position: relative; background: #000; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s; object-fit: contain; }
        .active-slide { opacity: 1; }

        /* --- VISTA PRECIOS --- */
        #view-precios { background: #fff; z-index: 100; }
        #header-precios { height: 80px; background: #005596; display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        #input-busqueda { flex-grow: 1; font-size: 1.5rem; padding: 12px; border-radius: 8px; border: none; }
        #tabla-container { height: calc(100% - 160px); overflow-y: auto; background: #fff; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid #eee; color: #333; font-size: 1.3rem; }
        .precio-tag { font-weight: bold; color: #005596; font-size: 1.6rem; text-align: right; }

        /* --- VISTA CÁMARA --- */
        #view-camara { background: #000; z-index: 200; }
        #interactive.viewport { width: 100%; height: 100%; position: relative; }
        #interactive video, #interactive canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .scan-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 30%; border: 4px dashed #ffcc00; border-radius: 15px; z-index: 210;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5); pointer-events: none;
        }

        /* Botones */
        .btn { padding: 15px 25px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; z-index: 50; }
        .btn-float { position: absolute; right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-precios { top: 20px; background: #ffcc00; color: #000; }
        .btn-scan { top: 100px; background: #00a859; color: #fff; }
        .btn-volver { width: 100%; height: 80px; background: #cc0000; color: #fff; font-size: 1.5rem; border-radius: 0; }
        
        #info-bar { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; justify-content: space-between; padding: 10px 20px; box-sizing: border-box; z-index: 10; border-top: 2px solid #005596; }
    </style>
</head>
<body>

    <div id="view-promos" class="view active-view">
        <button class="btn btn-float btn-precios" onclick="openPrecios()">LISTA DE PRECIOS</button>
        <button class="btn btn-float btn-scan" onclick="openCamara()">📷 ESCANEAR</button>
        <div id="slideshow"></div>
        <div id="info-bar">
            <div id="label-data">Cargando...</div>
            <div id="clock">00:00</div>
        </div>
    </div>

    <div id="view-precios" class="view">
        <div id="header-precios">
            <input type="text" id="input-busqueda" placeholder="Buscar..." onkeyup="filtrarPrecios()">
            <button class="btn" style="background:#00a859; color:white" onclick="openCamara()">📷</button>
        </div>
        <div id="tabla-container">
            <table><tbody id="body-precios"></tbody></table>
        </div>
        <button class="btn btn-volver" onclick="resetApp()">VOLVER A PROMOS</button>
    </div>

    <div id="view-camara" class="view">
        <div class="scan-overlay"></div>
        <div id="interactive"></div>
        <button class="btn btn-volver" style="position:absolute; bottom:0;" onclick="resetApp()">CANCELAR</button>
    </div>

    <script>
        var area = new URLSearchParams(window.location.search).get('area') || 'full';
        var listaPrecios = [];
        var imagesFound = [];
        var currentSlide = 1;

        // --- 1. SLIDESHOW Y AUTO-DETECCION ---
        function scanImages(index) {
            if (index > 25) { startSlideshow(); return; }
            var isLandscape = window.innerWidth > window.innerHeight;
            var suffix = isLandscape ? "_h" : "_v";
            var prefix = (area === 'gaming') ? 'gc' : area;
            var src = "media/" + area + "/" + prefix + (index < 10 ? "0" + index : index) + suffix + ".jpg";
            
            var img = new Image();
            img.onload = function() { imagesFound.push(src); scanImages(index + 1); };
            img.onerror = function() { startSlideshow(); };
            img.src = src;
        }

        function startSlideshow() {
            var container = document.getElementById('slideshow');
            if (imagesFound.length === 0) { document.getElementById('label-data').innerText = "Sin fotos"; return; }
            
            for (var i = 0; i < imagesFound.length; i++) {
                var el = document.createElement('img');
                el.src = imagesFound[i];
                el.className = 'slide' + (i === 0 ? ' active-slide' : '');
                el.id = 'slide-' + (i + 1);
                container.appendChild(el);
            }
            document.getElementById('label-data').innerText = area.toUpperCase() + " | A:" + imagesFound.length;

            if (imagesFound.length > 1) {
                setInterval(function() {
                    document.getElementById('slide-' + currentSlide).classList.remove('active-slide');
                    currentSlide = (currentSlide % imagesFound.length) + 1;
                    document.getElementById('slide-' + currentSlide).classList.add('active-slide');
                }, 8000);
            }
        }

        // --- 2. GESTIÓN DE VISTAS Y BOTONES ---
        function resetApp() {
            try { Quagga.stop(); } catch(e) {}
            document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active-view'); });
            document.getElementById('view-promos').classList.add('active-view');
        }

        function openPrecios() {
            document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active-view'); });
            document.getElementById('view-precios').classList.add('active-view');
            renderTabla(listaPrecios);
        }

        // --- 3. CÁMARA (Arreglado para KitKat) ---
        function openCamara() {
            document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active-view'); });
            document.getElementById('view-camara').classList.add('active-view');

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: { facingMode: "user" } // Usa la frontal
                },
                decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] }
            }, function(err) {
                if (err) { 
                    alert("Error cámara: " + err.name); 
                    resetApp(); 
                    return; 
                }
                Quagga.start();
            });

            Quagga.onDetected(function(data) {
                var code = data.codeResult.code;
                Quagga.stop();
                openPrecios();
                document.getElementById('input-busqueda').value = code;
                filtrarPrecios();
            });
        }

        // --- 4. PRECIOS Y BUSCADOR ---
        function filtrarPrecios() {
            var term = document.getElementById('input-busqueda').value.toLowerCase();
            var filtrados = listaPrecios.filter(function(item) {
                return item.n.toLowerCase().indexOf(term) > -1 || item.b.indexOf(term) > -1;
            });
            renderTabla(filtrados);
        }

        function renderTabla(datos) {
            var html = "";
            for (var i = 0; i < datos.length; i++) {
                html += "<tr><td>"+datos[i].n+"<br><small>"+datos[i].b+"</small></td><td class='precio-tag'>"+datos[i].p+"</td></tr>";
            }
            document.getElementById('body-precios').innerHTML = html || "<tr><td>Sin resultados</td></tr>";
        }

        // --- INICIO ---
        function init() {
            // Cargar Precios
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'precios.json?v=' + Math.random(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    listaPrecios = JSON.parse(xhr.responseText);
                }
            };
            xhr.send();

            // Reloj
            setInterval(function() {
                var now = new Date();
                var h = (now.getHours() < 10 ? "0" : "") + now.getHours();
                var m = (now.getMinutes() < 10 ? "0" : "") + now.getMinutes();
                document.getElementById('clock').innerText = h + ":" + m;
            }, 1000);

            scanImages(1);
        }

        window.onload = init;
    </script>
</body>
</html>
