<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Scanner v3 - Canvas</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; padding: 15px; box-sizing: border-box; }
        video { width: 100%; max-height: 35vh; object-fit: cover; background: #000; display: block; transform: scaleX(-1); }
        canvas { display: none; }
        #log { background: #000; border: 1px solid #333; padding: 10px; font-size: 12px; font-family: monospace; height: 180px; overflow-y: auto; margin-top: 10px; }
        button { padding: 15px 20px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin: 8px 4px; }
        .ok { background: #00a859; color: #fff; }
        .err { background: #cc0000; color: #fff; }
        #resultado { font-size: 2rem; font-weight: bold; color: #ffcc00; padding: 10px 0; min-height: 55px; }
    </style>
</head>
<body>
    <h2 style="margin:0 0 10px">Test v3 - Canvas</h2>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    <div id="resultado">—</div>
    <button class="ok" onclick="iniciar()">Iniciar</button>
    <button class="err" onclick="detener()">Detener</button>
    <div id="log"></div>

    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    <script>
        let stream = null;
        let reader = null;
        let frameTimer = null;
        let frameCount = 0;
        let scanning = false;

        function log(msg, tipo) {
            const el = document.getElementById('log');
            const color = tipo === 'ok' ? '#0f0' : tipo === 'err' ? '#f44' : '#ff0';
            el.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        function iniciar() {
            log('Abriendo cámara...', 'info');
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: {ideal:1280}, height: {ideal:720} } })
            .then(s => {
                stream = s;
                const v = document.getElementById('v');
                v.srcObject = s;
                v.onloadedmetadata = () => {
                    const w = v.videoWidth, h = v.videoHeight;
                    log('Video listo: ' + w + 'x' + h, 'ok');
                    const c = document.getElementById('c');
                    c.width = w; c.height = h;

                    reader = new ZXing.BrowserMultiFormatReader();
                    const hints = new Map();
                    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                        ZXing.BarcodeFormat.EAN_8,
                        ZXing.BarcodeFormat.EAN_13,
                        ZXing.BarcodeFormat.CODE_128
                    ]);
                    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
                    reader.hints = hints;

                    scanning = true;
                    log('Escaneando frames... acercá un código', 'ok');
                    scanFrame();
                };
            })
            .catch(e => log('Error cámara: ' + e.name, 'err'));
        }

        function scanFrame() {
            if (!scanning) return;
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            const ctx = c.getContext('2d');

            // Dibujar frame actual en canvas (sin espejo — ZXing lee el canvas)
            ctx.drawImage(v, 0, 0, c.width, c.height);
            frameCount++;

            // Log cada 30 frames para confirmar que está corriendo
            if (frameCount % 30 === 0) log('Frames procesados: ' + frameCount, 'info');

            try {
                const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(c);
                const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
                const result = reader.decodeBitmap(binaryBitmap);
                if (result) {
                    const codigo = result.getText();
                    log('✓ LEIDO: ' + codigo + ' (formato: ' + result.getBarcodeFormat() + ')', 'ok');
                    document.getElementById('resultado').innerText = '✓ ' + codigo;
                    // Seguir escaneando para confirmar
                }
            } catch(e) {
                // NotFoundException es normal, ignorar
                if (e.name !== 'NotFoundException') {
                    log('Error frame ' + frameCount + ': ' + e.name, 'err');
                }
            }

            frameTimer = setTimeout(scanFrame, 200); // 5 fps — suficiente para barcode
        }

        function detener() {
            scanning = false;
            clearTimeout(frameTimer);
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            document.getElementById('v').srcObject = null;
            log('Detenido. Frames totales: ' + frameCount, 'warn');
            frameCount = 0;
        }

        log('Listo. Presioná Iniciar.', 'info');
    </script>
</body>
</html>
