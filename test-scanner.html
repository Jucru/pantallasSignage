<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Scanner - html5-qrcode</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; padding: 15px; box-sizing: border-box; }
        #reader { width: 100%; }
        #log { background: #000; border: 1px solid #333; padding: 10px; font-size: 12px; font-family: monospace; height: 200px; overflow-y: auto; margin-top: 10px; }
        button { padding: 14px 20px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin: 6px 4px; }
        .ok { background: #00a859; color: #fff; }
        .err { background: #cc0000; color: #fff; }
        #resultado { font-size: 2rem; font-weight: bold; color: #ffcc00; padding: 10px 0; min-height: 55px; }
    </style>
</head>
<body>
    <h2 style="margin:0 0 10px">Test - html5-qrcode</h2>
    <div id="reader"></div>
    <div id="resultado">—</div>
    <button class="ok"  onclick="iniciar()">Iniciar</button>
    <button class="err" onclick="detener()">Detener</button>
    <div id="log"></div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        let scanner = null;

        function log(msg, tipo) {
            const el = document.getElementById('log');
            const color = tipo === 'ok' ? '#0f0' : tipo === 'err' ? '#f44' : '#ff0';
            el.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        function iniciar() {
            log('Iniciando html5-qrcode...', 'info');

            scanner = new Html5Qrcode("reader");

            const config = {
                fps: 15,
                qrbox: { width: 280, height: 140 },
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.CODE_128
                ],
                // Configuración crítica de cámara
                videoConstraints: {
                    facingMode: "user",
                    width:  { ideal: 1280 },
                    height: { ideal: 720 },
                    advanced: [
                        { focusMode: "continuous" },
                        { focusDistance: 0.05 }   // foco macro
                    ]
                },
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true  // usa API nativa del navegador si está disponible (más rápido)
                }
            };

            scanner.start(
                { facingMode: "user" },
                config,
                (codigo, result) => {
                    log('✓ LEIDO: ' + codigo + ' | formato: ' + result.result.format.formatName, 'ok');
                    document.getElementById('resultado').innerText = '✓ ' + codigo;
                },
                (errorMsg) => {
                    // errores de frame son normales, no loguear
                }
            ).then(() => {
                log('Scanner activo. Acercá el código al recuadro.', 'ok');
            }).catch(e => {
                log('Error al iniciar: ' + e, 'err');
            });
        }

        function detener() {
            if (scanner) {
                scanner.stop().then(() => {
                    scanner.clear();
                    scanner = null;
                    log('Detenido.', 'warn');
                }).catch(e => log('Error al detener: ' + e, 'err'));
            }
        }

        log('Listo. Presioná Iniciar.', 'info');
    </script>
</body>
</html>
