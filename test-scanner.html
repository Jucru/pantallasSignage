<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Scanner v2</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; padding: 20px; box-sizing: border-box; }
        video { width: 100%; max-height: 40vh; object-fit: cover; background: #000; display: block; transform: scaleX(-1); }
        #log { background: #000; border: 1px solid #333; padding: 10px; font-size: 13px; font-family: monospace; height: 200px; overflow-y: auto; margin-top: 10px; }
        button { padding: 15px 20px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin: 8px 4px; }
        .ok { background: #00a859; color: #fff; }
        .err { background: #cc0000; color: #fff; }
        #resultado { font-size: 2rem; font-weight: bold; color: #ffcc00; padding: 15px 0; min-height: 60px; }
    </style>
</head>
<body>
    <h2 style="margin:0 0 10px">Test Scanner v2</h2>
    <video id="v" autoplay playsinline muted></video>
    <div id="resultado">—</div>
    <button class="ok" onclick="iniciar()">Iniciar escaneo</button>
    <button class="err" onclick="detener()">Detener</button>
    <div id="log"></div>

    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    <script>
        let reader = null;

        function log(msg, tipo) {
            const el = document.getElementById('log');
            const color = tipo === 'ok' ? '#0f0' : tipo === 'err' ? '#f44' : '#ff0';
            el.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        function iniciar() {
            log('Iniciando con decodeFromConstraints...', 'info');
            try {
                reader = new ZXing.BrowserMultiFormatReader();

                const hints = new Map();
                hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                    ZXing.BarcodeFormat.EAN_8,
                    ZXing.BarcodeFormat.EAN_13,
                    ZXing.BarcodeFormat.CODE_128
                ]);
                hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
                reader.hints = hints;

                const constraints = {
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                // ZXing maneja el stream internamente - más confiable
                reader.decodeFromConstraints(constraints, document.getElementById('v'), (result, err) => {
                    if (result) {
                        const codigo = result.getText();
                        const fmt = result.getBarcodeFormat();
                        log('✓ LEIDO: ' + codigo + ' formato=' + fmt, 'ok');
                        document.getElementById('resultado').innerText = '✓ ' + codigo;
                    } else if (err && !(err instanceof ZXing.NotFoundException)) {
                        log('Error: ' + err.name + ' ' + err.message, 'err');
                    }
                });

                log('Scanner activo, acercá un código', 'ok');
            } catch(e) {
                log('Excepción: ' + e.name + ' - ' + e.message, 'err');
            }
        }

        function detener() {
            if (reader) { try { reader.reset(); } catch(e){} reader = null; }
            log('Detenido.', 'warn');
        }

        log('Listo. Presioná Iniciar escaneo.', 'info');
    </script>
</body>
</html>
